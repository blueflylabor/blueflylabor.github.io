---
layout: default
title: Search
permalink: /search/
---
<style>
.search-input {
  padding: 8px;
  width: 300px;
}
#result-box {
  margin-top:20px;
  padding:15px;
  border:1px solid #ccc;
  min-height:80px;
}
<script>
let list = [];
const resBox = document.getElementById("result-box");
const log = document.getElementById("log");
const base = "{{ site.baseurl }}";

// 加载索引
fetch(base + "/search-data.json")
.then(r => {
  if(!r.ok) throw "文件404";
  return r.json();
})
.then(data => {
  list = data;
  log.innerText = "已加载文章：" + list.length + " 篇";
  
  // 【新增】数据加载成功后，检查 URL 是否带有搜索参数
  checkUrlParam();
})
.catch(e => {
  console.error(e);
  log.innerText = "加载失败：" + e;
  resBox.innerText = "无法读取文章数据";
});

function runSearch(){
  const kw = document.getElementById("kw").value.toLowerCase().trim();
  resBox.innerHTML = "";
  if(!kw){
    resBox.innerText = "请输入关键词";
    return;
  }

  // 过滤文章（带严格判空）
  const arr = list.filter(p => {
    const title = (p.title && typeof p.title === 'string') ? p.title.toLowerCase() : "";
    const content = (p.raw_content && typeof p.raw_content === 'string') ? p.raw_content.toLowerCase() : "";
    const categories = Array.isArray(p.categories) ? p.categories.join(" ").toLowerCase() : "";
    const tags = Array.isArray(p.tags) ? p.tags.join(" ").toLowerCase() : "";

    return title.includes(kw) || 
           categories.includes(kw) || 
           tags.includes(kw) || 
           content.includes(kw);
  });

  log.innerText = "匹配数量：" + arr.length;

  if(arr.length === 0){
    resBox.innerText = "没有找到相关文章";
    return;
  }

  // 渲染结果
  let html = "";
  arr.forEach(item => {
    const displayTitle = item.title || item.url || "无标题文章";
    html += `<p><a href="${base}${item.url}">${displayTitle}</a></p>`;
  });
  resBox.innerHTML = html;
}

// 【新增函数】用于解析 URL 参数并自动搜索
function checkUrlParam() {
  // 获取当前 URL 的参数对象
  const urlParams = new URLSearchParams(window.location.search);
  
  // 检查是否包含 'topic' 或 'q' 参数（兼容两种写法）
  const keyword = urlParams.get('topic') || urlParams.get('q');
  
  if (keyword) {
    // 1. 将关键词解码（防止中文或特殊字符乱码）并填入输入框
    document.getElementById("kw").value = decodeURIComponent(keyword);
    // 2. 自动触发搜索
    runSearch();
  }
}
</script>
