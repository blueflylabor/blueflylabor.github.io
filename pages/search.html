---
layout: default
title: Search
permalink: /search/
---
<input id="kw" placeholder="Input tag like notes">
<button onclick="runSearch()">Search</button>
<div id="log"></div>
<div id="res"></div>

<script>
let list = [];
const log = document.getElementById('log');
const resBox = document.getElementById('res');

// 加载索引
fetch("/search-data.json")
.then(r=>r.json())
.then(data=>{
  list = data;
  log.innerText = "Loaded total: " + list.length;
})
.catch(err=>log.innerText="Load error:"+err);

function runSearch(){
  const kw = document.getElementById('kw').value.toLowerCase();
  const filter = list.filter(item=>{
    const t = item.title.toLowerCase();
    const tagStr = item.tags.join(" ").toLowerCase();
    return t.includes(kw) || tagStr.includes(kw);
  })
  log.innerText += "\nMatch num: " + filter.length;
  let html = "";
  filter.forEach(p=>{
    html += `<div><a href="${p.url}">${p.title}</a></div>`
  })
  resBox.innerHTML = html;
}
</script>
