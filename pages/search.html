---
layout: default
title: Search
permalink: /search/
---

<style>
.search-container { max-width: 600px; margin: 30px auto; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.search-wrapper { display: flex; gap: 10px; margin-bottom: 15px; }
.search-input { flex: 1; padding: 12px 16px; font-size: 16px; border: 2px solid #e2e8f0; border-radius: 8px; outline: none; }
.search-btn { padding: 12px 24px; font-size: 16px; color: #fff; background-color: #3b82f6; border: none; border-radius: 8px; cursor: pointer; }
/* 语言过滤栏样式 */
.filter-group { margin-bottom: 20px; display: flex; gap: 15px; align-items: center; color: #64748b; font-size: 14px; }
.filter-group label { cursor: pointer; display: flex; align-items: center; gap: 5px; }
#log-info { font-size: 14px; color: #64748b; margin-bottom: 12px; }
.search-item { padding: 12px 16px; margin-bottom: 12px; border-radius: 8px; background-color: #f8fafc; border: 1px solid #f1f5f9; }
.search-item a { font-size: 18px; font-weight: 600; color: #1e293b; text-decoration: none; }
</style>

<div class="search-container">
  <div class="search-wrapper">
    <input id="kw" class="search-input" placeholder="Type keywords..." onkeydown="if(event.key === 'Enter') runSearch()">
    <button class="search-btn" onclick="runSearch()">Search</button>
  </div>

  <div class="filter-group">
    <span>Filter by:</span>
    <label><input type="radio" name="lang" value="all" checked onchange="runSearch()"> All</label>
    <label><input type="radio" name="lang" value="zh" onchange="runSearch()"> Chinese</label>
    <label><input type="radio" name="lang" value="en" onchange="runSearch()"> English</label>
  </div>

  <div id="log-info">Loading...</div>
  <div id="result-box"></div>
</div>

<script>
let list = [];
const base = "{{ site.baseurl }}".replace(/\/$/, ""); 

// 初始化：检查 URL 参数
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('q')) document.getElementById("kw").value = decodeURIComponent(urlParams.get('q'));
if (urlParams.get('lang')) {
  const lang = urlParams.get('lang');
  document.querySelectorAll('input[name="lang"]').forEach(el => {
    if(el.value === lang) el.checked = true;
  });
}

fetch(base + "/search-data.json")
.then(r => r.json())
.then(data => {
  list = data;
  document.getElementById("log-info").innerText = "Indexed " + list.length + " articles.";
  if (document.getElementById("kw").value.trim()) runSearch();
});

function runSearch(){
  const kw = document.getElementById("kw").value.toLowerCase().trim();
  const selectedLang = document.querySelector('input[name="lang"]:checked').value;
  const resBox = document.getElementById("result-box");
  resBox.innerHTML = "";
  
  if(!kw){
    document.getElementById("log-info").innerText = "Please enter a keyword.";
    return;
  }

  const arr = list.filter(p => {
    // 语言过滤
    const langMatch = (selectedLang === 'all' || p.lang === selectedLang);
    // 内容匹配
    const content = (p.title + p.raw_content + (p.tags||[]).join(" ") + (p.categories||[]).join(" ")).toLowerCase();
    
    return langMatch && content.includes(kw);
  });

  document.getElementById("log-info").innerText = "Matches found: " + arr.length;
  arr.forEach(item => {
    resBox.innerHTML += `<div class="search-item"><a href="${base + item.url}">${item.title}</a></div>`;
  });
}
</script>
