---
layout: default
title: Search
permalink: /search/
---
<style>
.search-input{width:100%;padding:10px;font-size:16px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box}
.search-item{padding:12px 0;border-bottom:1px solid #eee}
.search-item h3{margin:0 0 4px 0}
.search-item .meta{color:#777;font-size:14px}
.empty-tip{color:#999;text-align:center;padding:30px 0}
.debug{margin:20px 0;padding:10px;background:#f5f5f5;font-size:12px;white-space:pre-wrap}
</style>

<div class="page-container">
  <h1>Search Articles</h1>
  <input class="search-input" id="searchInput" placeholder="输入关键词搜索标题、标签、正文" autocomplete="off">
  <div id="resultBox"></div>
  <div class="debug" id="debugBox">数据加载中...</div>
</div>

<script>
let articleList = [];
const input = document.getElementById("searchInput");
const resultBox = document.getElementById("resultBox");
const debugBox = document.getElementById("debugBox");

// 防抖函数，避免频繁渲染
let timer = null;
function debounceSearch(val) {
  clearTimeout(timer);
  timer = setTimeout(() => search(val), 300);
}

// 加载索引
async function loadIndex(){
  try {
    const res = await fetch("{{ site.baseurl }}/search-data.json");
    if (!res.ok) throw new Error("json文件加载失败");
    articleList = await res.json();
    debugBox.innerText = `✅ 成功加载文章总数：${articleList.length}`;
  } catch(err) {
    debugBox.innerText = `❌ 加载失败：${err.message}\n检查地址：{{ site.baseurl }}/search-data.json`;
  }
}

// 关键词匹配逻辑（保留原文不剥离html，中文精准匹配）
function search(keyword){
  const kw = keyword.trim().toLowerCase();
  resultBox.innerHTML = "";
  if(!kw) return;

  const filter = articleList.filter(item=>{
    const t = item.title.toLowerCase();
    const c = item.raw_content.toLowerCase();
    const tagStr = item.tags.join(" ").toLowerCase();
    const catStr = item.categories.join(" ").toLowerCase();
    return t.includes(kw) || c.includes(kw) || tagStr.includes(kw) || catStr.includes(kw);
  });
  render(filter);
}

// 渲染结果
function render(list){
  if(list.length === 0){
    resultBox.innerHTML = `<p class="empty-tip">未找到匹配文章</p>`;
    return;
  }
  let html = "";
  list.forEach(item=>{
    html += `
    <div class="search-item">
      <h3><a href="{{ site.baseurl }}${item.url}">${item.title}</a></h3>
      <div class="meta">标签：${item.tags.join(", ")} | 分类：${item.categories.join(", ")}</div>
    </div>
    `;
  })
  resultBox.innerHTML = html;
}

// 监听输入
input.addEventListener("input",e=>debounceSearch(e.target.value));
loadIndex();
</script>
