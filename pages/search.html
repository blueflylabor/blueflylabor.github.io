---
layout: default
title: Search
permalink: /search/
---
<style>
.search-input {
  padding: 8px;
  width: 300px;
}
#result-box {
  margin-top:20px;
  padding:15px;
  border:1px solid #ccc;
  min-height:80px;
}
</style>

<!-- 搜索框 -->
<input id="kw" placeholder="输入关键词">
<button onclick="runSearch()">搜索</button>

<!-- 独立、带边框的结果展示区块 -->
<div id="result-box">这里是搜索结果区域</div>

<div id="log"></div>
<script>
let list = [];
const resBox = document.getElementById("result-box");
const log = document.getElementById("log");
const base = "{{ site.baseurl }}";

// 加载索引
fetch(base + "/search-data.json")
.then(r => {
  if(!r.ok) throw "文件404";
  return r.json();
})
.then(data => {
  list = data;
  log.innerText = "已加载文章：" + list.length + " 篇";
})
.catch(e => {
  console.error(e); // 在控制台打印具体错误，方便调试
  log.innerText = "加载失败：" + e;
  resBox.innerText = "无法读取文章数据";
});
function runSearch(){
  const kw = document.getElementById("kw").value.toLowerCase().trim();
  resBox.innerHTML = "";
  if(!kw){
    resBox.innerText = "请输入关键词";
    return;
  }

  // 过滤文章
  const arr = list.filter(p => {
    // 严格判空：如果字段不存在或为 null，则给一个空字符串 "" 
    const title = (p.title && typeof p.title === 'string') ? p.title.toLowerCase() : "";
    const content = (p.raw_content && typeof p.raw_content === 'string') ? p.raw_content.toLowerCase() : "";
    
    // 分类和标签判空
    const categories = Array.isArray(p.categories) ? p.categories.join(" ").toLowerCase() : "";
    const tags = Array.isArray(p.tags) ? p.tags.join(" ").toLowerCase() : "";

    // 只要有一个地方匹配成功就返回
    return title.includes(kw) || 
           categories.includes(kw) || 
           tags.includes(kw) || 
           content.includes(kw);
  });

  log.innerText = "匹配数量：" + arr.length;

  if(arr.length === 0){
    resBox.innerText = "没有找到相关文章";
    return;
  }

  // 渲染结果
  let html = "";
  arr.forEach(item => {
    // 如果没有标题，就用 URL 或者提示文字顶替，防止页面显示空白
    const displayTitle = item.title || item.url || "无标题文章";
    html += `<p><a href="${base}${item.url}">${displayTitle}</a></p>`;
  });
  resBox.innerHTML = html;
}
</script>
