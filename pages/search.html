---
layout: default
title: Search
permalink: /search/
---
<style>
.search-input {
  padding: 8px;
  width: 300px;
}
#result-box {
  margin-top:20px;
  padding:15px;
  border:1px solid #ccc;
  min-height:80px;
}
</style>

<!-- 搜索框 -->
<input id="kw" placeholder="输入关键词">
<button onclick="runSearch()">搜索</button>

<!-- 独立、带边框的结果展示区块 -->
<div id="result-box">这里是搜索结果区域</div>

<div id="log"></div>

<script>
let list = [];
const resBox = document.getElementById("result-box");
const log = document.getElementById("log");
const base = "{{ site.baseurl }}";

// 加载索引
fetch(base + "/search-data.json")
.then(r=>{
  if(!r.ok) throw "文件404";
  return r.json();
})
.then(data=>{
  list = data;
  log.innerText = "已加载文章："+list.length+" 篇";
})
.catch(e=>{
  log.innerText = "加载失败："+e;
  resBox.innerText = "无法读取文章数据";
});

function runSearch(){
  const kw = document.getElementById("kw").value.toLowerCase().trim();
  resBox.innerHTML = "";
  if(!kw){
    resBox.innerText = "请输入关键词";
    return;
  }

  const arr = list.filter(p=>{
    const t = p.title.toLowerCase();
    const c = p.categories.join(" ").toLowerCase();
    return t.includes(kw) || c.includes(kw);
  });

  log.innerText = "匹配数量："+arr.length;

  if(arr.length === 0){
    resBox.innerText = "没有找到相关文章";
    return;
  }

  let html = "";
  arr.forEach(item=>{
    html += `<p><a href="${base}${item.url}">${item.title}</a></p>`;
  })
  resBox.innerHTML = html;
}
</script>
