---
layout: default
title: Search
permalink: /search/
---
<style>
.search-input{width:100%;padding:10px;font-size:16px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box}
.search-btn{margin:8px 0;padding:8px 16px;cursor:pointer}
.search-item{padding:12px 0;border-bottom:1px solid #eee}
.search-item h3{margin:0 0 4px 0}
.search-item .meta{color:#777;font-size:14px}
.empty-tip{color:#999;text-align:center;padding:30px 0}
.debug{margin:20px 0;padding:10px;background:#f5f5f5;font-size:12px;white-space:pre-wrap;max-height:300px;overflow:auto}
</style>

<div class="page-container">
  <h1>Search Articles</h1>
  <input class="search-input" id="searchInput" placeholder="Enter keywords to search title, tags, content" autocomplete="off">
  <button class="search-btn" id="searchBtn">Search</button>
  <div id="resultBox"></div>
  <div class="debug" id="debugBox">Loading data...</div>
</div>

<script>
let articleList = [];
const input = document.getElementById("searchInput");
const resultBox = document.getElementById("resultBox");
const debugBox = document.getElementById("debugBox");
const searchBtn = document.getElementById("searchBtn");

function doSearch(keyword){
  const kw = keyword.trim().toLowerCase();
  resultBox.innerHTML = "";
  let log = `✅ Loaded total articles: ${articleList.length}`;
  if(!kw){
    debugBox.innerText = log;
    return;
  }

  // 过滤匹配
  const matched = articleList.filter(item=>{
    const title = item.title.toLowerCase();
    const content = item.raw_content.toLowerCase();
    const tagsStr = item.tags.join(" ").toLowerCase();
    const catsStr = item.categories.join(" ").toLowerCase();
    return title.includes(kw) || content.includes(kw) || tagsStr.includes(kw) || catsStr.includes(kw);
  });

  log += "\nSearch keyword: " + kw;
  log += "\nMatched count: " + matched.length;
  // 打印第一条文章数据，查看真实字段内容
  if(articleList.length > 0){
    log += "\n\n=== First Article Sample Data ===";
    log += "\nTitle: " + articleList[0].title;
    log += "\nTags: " + articleList[0].tags.join(",");
    log += "\nCategories: " + articleList[0].categories.join(",");
  }
  debugBox.innerText = log;

  renderList(matched);
}

function renderList(list){
  if(list.length === 0){
    resultBox.innerHTML = `<p class="empty-tip">No matching articles found</p>`;
    return;
  }
  let htmlStr = "";
  list.forEach(post => {
    htmlStr += `
    <div class="search-item">
      <h3><a href="${post.url}">${post.title}</a></h3>
      <div class="meta">Tags: ${post.tags.join(", ")} | Categories: ${post.categories.join(", ")}</div>
    </div>
    `;
  });
  resultBox.innerHTML = htmlStr;
}

async function loadData(){
  try {
    const resp = await fetch("{{ site.baseurl }}/search-data.json");
    if(!resp.ok) throw new Error("Fetch failed");
    articleList = await resp.json();
    debugBox.innerText = `✅ Loaded total articles: ${articleList.length}`;
  }catch(e){
    debugBox.innerText = `❌ Error: ${e.message}`;
  }
}

searchBtn.addEventListener("click", ()=> doSearch(input.value));
input.addEventListener("keydown", e => e.key === "Enter" && doSearch(input.value));
input.addEventListener("input", e => doSearch(e.target.value));

loadData();
</script>
