---
layout: default
title: Search
permalink: /search/
---
<style>
.search-input{width:100%;padding:10px;font-size:16px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box}
.search-item{padding:12px 0;border-bottom:1px solid #eee}
.search-item h3{margin:0 0 4px 0}
.search-item .meta{color:#777;font-size:14px}
.empty-tip{color:#999;text-align:center;padding:30px 0}
.debug{margin:20px 0;padding:10px;background:#f5f5f5;font-size:12px;white-space:pre-wrap}
</style>

<div class="page-container">
  <h1>Search Articles</h1>
  <input class="search-input" id="searchInput" placeholder="Enter keywords to search title, tags, content" autocomplete="off">
  <div id="resultBox"></div>
  <div class="debug" id="debugBox">Loading data...</div>
</div>

<script>
let articleList = [];
const input = document.getElementById("searchInput");
const resultBox = document.getElementById("resultBox");
const debugBox = document.getElementById("debugBox");

let timer = null;
function debounceSearch(val) {
  clearTimeout(timer);
  timer = setTimeout(() => doSearch(val), 300);
}

// 统一检索函数
function doSearch(keyword){
  const kw = keyword.trim().toLowerCase();
  resultBox.innerHTML = "";
  if(!kw) return;

  const filter = articleList.filter(item=>{
    const t = item.title.toLowerCase();
    const c = item.raw_content.toLowerCase();
    const tagStr = item.tags.join(" ").toLowerCase();
    const catStr = item.categories.join(" ").toLowerCase();
    return t.includes(kw) || c.includes(kw) || tagStr.includes(kw) || catStr.includes(kw);
  });
  render(filter);
}

// 渲染英文提示
function render(list){
  if(list.length === 0){
    resultBox.innerHTML = `<p class="empty-tip">No matching articles found</p>`;
    return;
  }
  let html = "";
  list.forEach(item=>{
    html += `
    <div class="search-item">
      <h3><a href="{{ site.baseurl }}${item.url}">${item.title}</a></h3>
      <div class="meta">Tags: ${item.tags.join(", ")} | Categories: ${item.categories.join(", ")}</div>
    </div>
    `;
  })
  resultBox.innerHTML = html;
}

async function loadIndex(){
  try {
    const res = await fetch("{{ site.baseurl }}/search-data.json");
    if (!res.ok) throw new Error("Failed to load json");
    articleList = await res.json();
    debugBox.innerText = `✅ Loaded total articles: ${articleList.length}`;
  } catch(err) {
    debugBox.innerText = `❌ Load failed: ${err.message}\nURL: {{ site.baseurl }}/search-data.json`;
  }
}

// 输入实时搜索
input.addEventListener("input",e=>debounceSearch(e.target.value));
// 回车触发搜索
input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    clearTimeout(timer);
    doSearch(this.value);
  }
});

loadIndex();
</script>
