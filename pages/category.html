---
layout: default
title: Categories
permalink: /category/
---

<ul class="categories-list">
{% for tag in site.tags %}
  {% assign tag_name = tag | first %}
  {% assign tag_posts = tag | last %}
  <li>
    <a href="{{ site.baseurl }}/tag/{{ tag_name | slugify }}">
      {{ tag_name }} ({{ tag_posts.size }})
    </a>
  </li>
{% endfor %}
</ul>
